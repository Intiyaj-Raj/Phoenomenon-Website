<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Awards Section</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #fff;
        }

        .awards {
            width: 100%;
            padding: 70px;
        }

        .sub-title {
            font-size: 14px;
            letter-spacing: 4px;
            color: #777;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 59px;
            font-weight: 500;
            margin-bottom: 70px;
        }

        .award-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 70px;
        }

        .award-left {
            width: 65%;
        }

        . {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr;
            align-items: center;
            padding: 10px;
            border-top: 1px solid #ddd;
            cursor: pointer;
            transition: .35s;
        }

        .award-item:last-child {
            border-bottom: 1px solid #ddd;
        }

        .award-item:hover,
        .award-item.active {
            background: #efefef;
        }

        .award-item span {
            font-size: 15px;
        }


        .award-right {
            width: 35%;
            position: sticky;
            top: 80px;
            display: flex;
            justify-content: center;
        }

        .award-right img {

            width: 100%;

            max-width: 300px;

            height: 300px;

            object-fit: cover;

            border-radius: 20px;

            transition: .3s;

        }

        @media(max-width:900px) {

            .award-wrapper {
                /* flex-direction: column; */
            }

            .award-left,
            .award-right {
                width: 50%;
            }

            h1 {
                font-size: 48px;
            }

        }
    </style>
</head>

<body>

    <section class="awards">

        <p class="sub-title">AWARDS</p>

        <h1>Wins that inspire us forward</h1>
        <h2 class="award-company">Clutch</h2>

        <div class="award-wrapper">

            <div class="award-left">

                <div class="award-item active"
                    data-img="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=800">
                    <span>Top 1000 Company 2025</span>
                </div>

                <div class="award-item" data-img="https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=800">
                    <span>Top Product Design Company 2024</span>
                </div>

                <div class="award-item" data-img="https://images.unsplash.com/photo-1519389950473-47ba0277781c?w=800">
                    <span>Top User Research Company 2024</span>
                </div>

                <div class="award-item" data-img="https://images.unsplash.com/photo-1522071820081-009f0129c71c?w=800">
                    <span>Top React Developers 2024</span>
                </div>

                <div class="award-item" data-img="https://images.unsplash.com/photo-1552664730-d307ca884978?w=800">
                    <span>Top Ukrainian Company 2024</span>
                </div>

            </div>
            <div class="award-right">
                <img id="awardImage" src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=800">
            </div>

        </div>

    </section>

    <script>
        const items = document.querySelectorAll(".award-item");

        const image = document.getElementById("awardImage");

        items.forEach(item => {

            item.addEventListener("mouseenter", () => {

                document.querySelector(".award-item.active")?.classList.remove("active");

                item.classList.add("active");

                image.style.opacity = 0;

                setTimeout(() => {

                    image.src = item.dataset.img;

                    image.style.opacity = 1;

                }, 150);

            });

        });
    </script>

</body>

</html>
